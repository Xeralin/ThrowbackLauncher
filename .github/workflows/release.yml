name: release

on:
  release:
    types: [published]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Build frontend
        run: |
          pnpm -C web install --frozen-lockfile
          pnpm -C web build
      - uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: web/out

  linux:
    needs: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: app/requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: web-out
          path: web/out
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/.cache/ccache
          key: nuitka-linux-${{ hashFiles('app/requirements.txt') }}
          restore-keys: nuitka-linux-
      - name: Install deps + Nuitka
        run: |
          python -m pip install -r app/requirements.txt nuitka==4.1.3
          sudo apt-get update && sudo apt-get install -y patchelf ccache
      - name: Nuitka build (standalone)
        run: |
          python -m nuitka --standalone --enable-plugin=pyside6 --assume-yes-for-downloads \
            --include-package=core --include-package=bridge \
            --include-data-dir=web/out=web/out --include-data-dir=media=media \
            --include-data-dir=web/assets/splash=web/assets/splash \
            --include-data-files=manifest.toml=manifest.toml \
            --include-data-files=bin/liberator/Liberator.exe=bin/liberator/Liberator.exe \
            --include-data-files=bin/liberator/Shadow.dll=bin/liberator/Shadow.dll \
            --output-filename=Launcher --output-dir=nuitka-out app/main.py
      - name: Package AppImage
        run: |
          set -e
          dist=$(find nuitka-out -maxdepth 1 -name "*.dist" -type d | head -1)
          appdir=build/AppDir
          mkdir -p "$appdir/usr/bin"
          cp -a "$dist"/. "$appdir/usr/bin/"
          cp media/icon.png "$appdir/ThrowbackLauncher.png"
          printf '[Desktop Entry]\nType=Application\nName=Throwback Launcher\nComment=A Rainbow Six Siege launcher for Operation Throwback\nExec=Launcher\nIcon=ThrowbackLauncher\nTerminal=false\nCategories=Game;\nStartupWMClass=ThrowbackLauncher\n' > "$appdir/ThrowbackLauncher.desktop"
          printf '#!/usr/bin/env bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexport QTWEBENGINE_DISABLE_SANDBOX=1\nexec "$HERE/usr/bin/Launcher" "$@"\n' > "$appdir/AppRun"
          chmod +x "$appdir/AppRun"
          curl -fsSL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          mkdir -p out
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool "$appdir" out/Launcher.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: out/Launcher.AppImage

  windows:
    needs: frontend
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: app/requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: web-out
          path: web/out
      - uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Nuitka\Nuitka\Cache
          key: nuitka-windows-${{ hashFiles('app/requirements.txt') }}
          restore-keys: nuitka-windows-
      - name: Install deps + Nuitka
        run: python -m pip install -r app/requirements.txt nuitka==4.1.3
      - name: Nuitka build app (standalone)
        run: python -m nuitka --standalone --enable-plugin=pyside6 --assume-yes-for-downloads --windows-console-mode=disable --include-package=core --include-package=bridge --include-data-dir=web/out=web/out --include-data-dir=media=media --include-data-dir=web/assets/splash=web/assets/splash --include-data-files=manifest.toml=manifest.toml --include-data-files=bin/liberator/Liberator.exe=bin/liberator/Liberator.exe --include-data-files=bin/liberator/Shadow.dll=bin/liberator/Shadow.dll --output-filename=Launcher.exe --output-dir=app-out app/main.py
      - name: Nuitka build loader (onefile)
        run: python -m nuitka --onefile --enable-plugin=pyside6 --assume-yes-for-downloads --windows-console-mode=disable --include-data-dir=app/assets/fonts=assets/fonts --output-filename=Launcher.exe --output-dir=loader-out app/loader.py
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Compress-Archive -Path app-out/main.dist/* -DestinationPath out/App.zip -Force
          Copy-Item loader-out/Launcher.exe out/Launcher.exe -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            out/Launcher.exe
            out/App.zip

  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: "{appimage,windows}"
      - name: Attach binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "artifacts/appimage/Launcher.AppImage" \
            "artifacts/windows/Launcher.exe" \
            "artifacts/windows/App.zip" \
            --clobber --repo "${{ github.repository }}"
