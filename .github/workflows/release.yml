name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build frontend
        run: |
          pnpm -C web install --frozen-lockfile
          pnpm -C web build
      - uses: actions/upload-artifact@v4
        with:
          name: web-out
          path: web/out

  linux:
    needs: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@v4
        with:
          name: web-out
          path: web/out
      - name: Install deps + Nuitka
        run: |
          python -m pip install -r app/requirements.txt -r build-requirements.txt
          sudo apt-get update && sudo apt-get install -y patchelf ccache
      - name: Nuitka build (standalone)
        run: |
          python -m nuitka --standalone --enable-plugin=pyside6 --assume-yes-for-downloads \
            --include-package=core --include-package=bridge \
            --include-data-dir=web/out=web/out --include-data-dir=media=media \
            --include-data-dir=web/assets/splash=web/assets/splash \
            --include-data-files=manifest.toml=manifest.toml \
            --include-data-files=bin/Liberator.exe=bin/Liberator.exe \
            --include-data-files=bin/Liberator.exe.config=bin/Liberator.exe.config \
            --output-dir=nuitka-out app/main.py
      - name: Package AppImage
        run: |
          set -e
          dist=$(find nuitka-out -maxdepth 1 -name "*.dist" -type d | head -1)
          appdir=build/AppDir
          mkdir -p "$appdir/usr/bin"
          cp -a "$dist"/. "$appdir/usr/bin/"
          cp media/icon.png "$appdir/throwback-launcher.png"
          printf '[Desktop Entry]\nType=Application\nName=Throwback Launcher\nComment=A Rainbow Six Siege launcher for Operation Throwback\nExec=main.bin\nIcon=throwback-launcher\nTerminal=false\nCategories=Game;\nStartupWMClass=throwback-launcher\n' > "$appdir/throwback-launcher.desktop"
          printf '#!/usr/bin/env bash\nHERE="$(dirname "$(readlink -f "$0")")"\nexport QTWEBENGINE_DISABLE_SANDBOX=1\nexec "$HERE/usr/bin/main.bin" "$@"\n' > "$appdir/AppRun"
          chmod +x "$appdir/AppRun"
          curl -fsSL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          mkdir -p out
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool "$appdir" out/ThrowbackLauncher.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: out/ThrowbackLauncher.AppImage

  windows:
    needs: frontend
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@v4
        with:
          name: web-out
          path: web/out
      - name: Install deps + Nuitka
        run: python -m pip install -r app/requirements.txt -r build-requirements.txt
      - name: Nuitka build app (standalone)
        run: python -m nuitka --standalone --enable-plugin=pyside6 --assume-yes-for-downloads --windows-console-mode=disable --include-package=core --include-package=bridge --include-data-dir=web/out=web/out --include-data-dir=media=media --include-data-dir=web/assets/splash=web/assets/splash --include-data-files=manifest.toml=manifest.toml --include-data-files=bin/Liberator.exe=bin/Liberator.exe --include-data-files=bin/Liberator.exe.config=bin/Liberator.exe.config --output-filename=throwback-launcher.exe --output-dir=app-out app/main.py
      - name: Nuitka build loader (onefile)
        run: python -m nuitka --onefile --enable-plugin=pyside6 --assume-yes-for-downloads --windows-console-mode=disable --output-filename=ThrowbackLauncher.exe --output-dir=loader-out installer/loader.py
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Compress-Archive -Path app-out/main.dist/* -DestinationPath out/ThrowbackLauncher-app.zip -Force
          Copy-Item loader-out/ThrowbackLauncher.exe out/ThrowbackLauncher.exe -Force
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            out/ThrowbackLauncher.exe
            out/ThrowbackLauncher-app.zip

  release:
    needs: [linux, windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "artifacts/appimage/ThrowbackLauncher.AppImage" \
            "artifacts/windows/ThrowbackLauncher.exe" \
            "artifacts/windows/ThrowbackLauncher-app.zip" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
